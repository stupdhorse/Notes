name: Unit Tests
on:
  push:
    branches : ["main"]
  pull_request:
    branches : ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'oracle'
          cache: 'gradle'

      - name: Permissions
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test